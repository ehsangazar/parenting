name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - 'apps/parenting-frontend/**'
      - 'packages/shared/**'
      - 'packages/ui/**'
      - 'pnpm-lock.yaml'
  workflow_dispatch:

jobs:
  deploy:
    name: Trigger Coolify deploy
    runs-on: ubuntu-latest
    env:
      COOLIFY_HOST: https://coolify.gazar.dev
      COOLIFY_APP_UUID: dhmztdwzfrc1jje7y8ytug7q
      SITE_URL: https://parenting-frontend.gazar.dev/

    steps:
      - name: Set SENTRY_RELEASE on Coolify
        env:
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
          APP_UUID: ${{ env.COOLIFY_APP_UUID }}
          RELEASE_SHA: ${{ github.sha }}
        run: |
          payload=$(printf '{"key":"SENTRY_RELEASE","value":"%s","is_buildtime":true,"is_runtime":true,"is_preview":false}' "${RELEASE_SHA}")
          code=$(curl -sS -o /tmp/envresp.txt -w '%{http_code}' \
            -X PATCH "${COOLIFY_HOST}/api/v1/applications/${APP_UUID}/envs" \
            -H "Authorization: Bearer ${COOLIFY_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "${payload}")
          if [ "${code}" -ge 200 ] && [ "${code}" -lt 300 ]; then
            echo "SENTRY_RELEASE updated (${code})"
          else
            echo "PATCH returned ${code}; trying POST"
            cat /tmp/envresp.txt; echo
            curl --fail-with-body -sS \
              -X POST "${COOLIFY_HOST}/api/v1/applications/${APP_UUID}/envs" \
              -H "Authorization: Bearer ${COOLIFY_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "${payload}"
            echo
          fi

      - name: Trigger Coolify deploy
        id: trigger
        env:
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
        run: |
          set -euo pipefail
          response=$(curl -sS -o /tmp/deploy.json -w "%{http_code}" \
            -H "Authorization: Bearer $COOLIFY_TOKEN" \
            "$COOLIFY_HOST/api/v1/deploy?uuid=$COOLIFY_APP_UUID")
          echo "HTTP $response"
          cat /tmp/deploy.json
          test "$response" = "200"
          deployment_uuid=$(jq -r '.deployments[0].deployment_uuid' /tmp/deploy.json)
          echo "deployment_uuid=$deployment_uuid" >> "$GITHUB_OUTPUT"

      - name: Wait for deploy to finish
        env:
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
          DEPLOY_UUID: ${{ steps.trigger.outputs.deployment_uuid }}
        run: |
          set -euo pipefail
          deadline=$(( $(date +%s) + 900 ))
          while :; do
            status=$(curl -sS -H "Authorization: Bearer $COOLIFY_TOKEN" \
              "$COOLIFY_HOST/api/v1/deployments/$DEPLOY_UUID" | jq -r .status)
            echo "[$(date -u +%H:%M:%S)] status=$status"
            case "$status" in
              finished) break ;;
              failed|cancelled-by-user) echo "deploy ended with status=$status"; exit 1 ;;
            esac
            if [ "$(date +%s)" -gt "$deadline" ]; then
              echo "timed out after 15m waiting for deploy"
              exit 1
            fi
            sleep 15
          done

      - name: Smoke test
        run: |
          set -euo pipefail
          code=$(curl -sS -o /dev/null -w "%{http_code}" "$SITE_URL")
          echo "$SITE_URL -> $code"
          test "$code" = "200"
