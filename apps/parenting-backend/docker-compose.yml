# Local Postgres with pgvector for development.
# Run: docker compose up -d
# Then set in .env: DATABASE_URL=postgresql://postgres:postgres@localhost:5432/parenting_dev

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: parenting_dev
    ports:
      - "5432:5432"
    volumes:
      - parenting_db_data:/var/lib/postgresql/data

volumes:
  parenting_db_data:
